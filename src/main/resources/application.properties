spring.datasource.url=jdbc:postgresql://localhost:5432/smarthome
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.config.import=optional:classpath:application-local.properties

# --- Door email alerts (optional) ---
# Set these in application-local.properties (do not commit passwords).
# Example Gmail: use an App Password, not your normal password.
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=youraddress@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# smarthome.notify.email.to=youraddress@gmail.com

# Vision (llava) can run several minutes on CPU; avoid closing the HTTP connection early.
server.tomcat.connection-timeout=15m
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Local Ollama only (no cloud API keys). Match `ollama list`.
ollama.base.url=http://localhost:11434
ollama.model=phi3
# Plant Health: vision model must exist in `ollama list` (install: ollama pull llava)
ollama.vision.model=llava

# Weather widget (Open-Meteo free by default; optional OpenWeather key in application-local.properties)
smarthome.weather.latitude=13.0827
smarthome.weather.longitude=80.2707
# smarthome.weather.openweather.api-key=YOUR_OPENWEATHER_KEY

# ESP device base URL (connection badge + device toggle)
smarthome.esp.base-url=http://localhost
