server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:smarthome;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# Cloud demo: ESP/Ollama run on your machine, not on Render free tier.
smarthome.esp.base-url=http://localhost
ollama.base.url=http://localhost:11434

smarthome.weather.latitude=13.0827
smarthome.weather.longitude=80.2707

server.tomcat.connection-timeout=5m
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
