<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Smart Home</title>
    <style>
        :root {
            --accent-color: #4170bc;
            --hover-color: #22c55e;
            --btn-color: #2563eb;
        }

        .rooms-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .rooms-header h1 {
            margin: 0;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .room-page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .room-page-header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -0.02em;
        }

        .room-page-sub {
            color: #94a3b8;
            margin: 6px 0 0 0;
            font-size: 14px;
        }

        .room-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .room-summary-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 16px 18px;
        }

        .room-summary-card.accent-blue {
            border-color: rgba(59, 130, 246, 0.45);
            background: linear-gradient(135deg, #172554 0%, #1e293b 100%);
        }

        .room-summary-card.accent-green {
            border-color: rgba(34, 197, 94, 0.45);
            background: linear-gradient(135deg, #14532d 0%, #1e293b 100%);
        }

        .room-summary-card.accent-purple {
            border-color: rgba(168, 85, 247, 0.45);
            background: linear-gradient(135deg, #3b0764 0%, #1e293b 100%);
        }

        body.light-mode .room-summary-card {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        body.light-mode .room-summary-card.accent-blue { background: #eff6ff; }
        body.light-mode .room-summary-card.accent-green { background: #f0fdf4; }
        body.light-mode .room-summary-card.accent-purple { background: #faf5ff; }

        .room-summary-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #64748b;
            margin: 0 0 8px 0;
        }

        .room-summary-value {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: #f8fafc;
        }

        body.light-mode .room-summary-value { color: #0f172a; }

        .room-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            margin: 0 0 14px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        body.light-mode .room-section-title {
            border-bottom-color: #e2e8f0;
        }

        .room-card-pro {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 22px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            min-height: 190px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-card-pro:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
        }

        body.light-mode .room-card-pro {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }

        .room-card-pro.theme-living {
            border-left: 4px solid #f97316;
            background: linear-gradient(145deg, #1e293b 0%, #431407 120%);
        }

        .room-card-pro.theme-bedroom {
            border-left: 4px solid #a855f7;
            background: linear-gradient(145deg, #1e293b 0%, #3b0764 120%);
        }

        .room-card-pro.theme-kitchen {
            border-left: 4px solid #eab308;
            background: linear-gradient(145deg, #1e293b 0%, #422006 120%);
        }

        .room-card-pro.theme-bathroom {
            border-left: 4px solid #06b6d4;
            background: linear-gradient(145deg, #1e293b 0%, #083344 120%);
        }

        .room-card-pro.theme-hall {
            border-left: 4px solid #3b82f6;
            background: linear-gradient(145deg, #1e293b 0%, #172554 120%);
        }

        body.light-mode .room-card-pro.theme-living { background: linear-gradient(145deg, #fff 0%, #fff7ed 100%); }
        body.light-mode .room-card-pro.theme-bedroom { background: linear-gradient(145deg, #fff 0%, #faf5ff 100%); }
        body.light-mode .room-card-pro.theme-kitchen { background: linear-gradient(145deg, #fff 0%, #fefce8 100%); }
        body.light-mode .room-card-pro.theme-bathroom { background: linear-gradient(145deg, #fff 0%, #ecfeff 100%); }
        body.light-mode .room-card-pro.theme-hall { background: linear-gradient(145deg, #fff 0%, #eff6ff 100%); }

        .room-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .room-card-icon {
            font-size: 34px;
            line-height: 1;
        }

        .room-card-name {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #f8fafc;
        }

        body.light-mode .room-card-name { color: #0f172a; }

        .room-card-desc {
            margin: 0;
            font-size: 13px;
            color: #94a3b8;
        }

        .room-card-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .room-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .room-badge.on {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.35);
        }

        .room-badge.light-on {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
            border-color: rgba(250, 204, 21, 0.35);
        }

        body.light-mode .room-badge {
            background: #f1f5f9;
            color: #475569;
            border-color: #e2e8f0;
        }

        .room-open-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 220px;
            color: white;
        }

        #sensorDashboard {
            display: flex;
            flex-direction: column;
            gap: 28px;
            margin-top: 8px;
        }

        .sensor-page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 4px;
        }

        .sensor-page-header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -0.02em;
        }

        .sensor-page-sub {
            color: #94a3b8;
            margin: 6px 0 0 0;
            font-size: 14px;
        }

        .sensor-live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.35);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .sensor-live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: sensorPulse 1.8s infinite;
        }

        @keyframes sensorPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .sensor-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .sensor-summary-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 18px 20px;
            min-height: 110px;
        }

        .sensor-summary-card.highlight-temp {
            border-color: rgba(249, 115, 22, 0.45);
            background: linear-gradient(135deg, #431407 0%, #1e293b 100%);
        }

        .sensor-summary-card.highlight-hum {
            border-color: rgba(59, 130, 246, 0.45);
            background: linear-gradient(135deg, #172554 0%, #1e293b 100%);
        }

        .sensor-summary-card.highlight-safe {
            border-color: rgba(34, 197, 94, 0.45);
            background: linear-gradient(135deg, #14532d 0%, #1e293b 100%);
        }

        .sensor-summary-card.highlight-alert {
            border-color: rgba(239, 68, 68, 0.55);
            background: linear-gradient(135deg, #450a0a 0%, #1e293b 100%);
        }

        body.light-mode .sensor-summary-card {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        body.light-mode .sensor-summary-card.highlight-temp { background: #fff7ed; }
        body.light-mode .sensor-summary-card.highlight-hum { background: #eff6ff; }
        body.light-mode .sensor-summary-card.highlight-safe { background: #f0fdf4; }
        body.light-mode .sensor-summary-card.highlight-alert { background: #fef2f2; }

        .sensor-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            margin: 0 0 14px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        body.light-mode .sensor-section-title {
            color: #475569;
            border-bottom-color: #e2e8f0;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .sensor-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 148px;
            transition: transform 0.15s, border-color 0.15s;
        }

        .sensor-card:hover {
            transform: translateY(-2px);
            border-color: #475569;
        }

        body.light-mode .sensor-card {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }

        .sensor-card.status-safe { border-left: 4px solid #22c55e; }
        .sensor-card.status-warn { border-left: 4px solid #f59e0b; }
        .sensor-card.status-alert { border-left: 4px solid #ef4444; }
        .sensor-card.status-info { border-left: 4px solid #3b82f6; }

        .sensor-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .sensor-icon {
            font-size: 26px;
            line-height: 1;
        }

        .sensor-name {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
        }

        body.light-mode .sensor-name { color: #0f172a; }

        .sensor-type {
            margin: 0;
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sensor-value-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-top: auto;
        }

        .sensor-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            color: #f8fafc;
        }

        body.light-mode .sensor-value { color: #0f172a; }

        .sensor-unit {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }

        .sensor-status-text {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
        }

        .sensor-status-text.safe { color: #22c55e; }
        .sensor-status-text.warn { color: #f59e0b; }
        .sensor-status-text.alert { color: #ef4444; }
        .sensor-status-text.info { color: #60a5fa; }

        .sensor-updated {
            font-size: 12px;
            color: #64748b;
        }

        .sensor-error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
            padding: 24px;
            border-radius: 14px;
            text-align: center;
        }

        .sidebar {
            width: 230px;
            background: #1e293b;
            padding: 20px;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-item {
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 6px;
        }

        .menu-item:hover {
            background: var(--hover-color);
        }

        .content {
            margin-left: 270px;
            /* sidebar width + padding */
            flex: 1;
            padding: 30px;
            width: calc(100% - 270px);
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            background: var(--btn-color);
            border: none;
            color: white;
            cursor: pointer;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
            text-align: center;
        }

        .delete-btn {
            background: #dc2626;
            margin-top: 10px;
        }

        /* --- Profile Widget --- */
        .profile-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 15px 0 5px 0;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        body.light-mode .profile-widget {
            background: #f1f5f9;
        }

        .profile-widget:hover {
            background: var(--hover-color);
        }

        body.light-mode .profile-widget:hover {
            background: #e2e8f0;
        }

        .p-widget-avatar {
            font-size: 22px;
            width: 35px;
            height: 35px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.light-mode .p-widget-avatar {
            background: white;
        }

        .p-widget-name {
            font-weight: bold;
            font-size: 14px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Light Mode Core Overrides --- */
        body.light-mode {
            background: #f8fafc;
            color: #0f172a;
        }

        body.light-mode .card {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        body.light-mode .sidebar {
            background: #ffffff;
            color: #0f172a;
            border-right: 1px solid #e2e8f0;
        }

        body.light-mode .menu-item {
            color: #334155;
        }

        body.light-mode .menu-item:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        body.light-mode h1,
        body.light-mode h2 {
            color: #0f172a;
        }

        body.light-mode input {
            border: 1px solid #cbd5e1;
            background: #ffffff;
            color: #0f172a;
        }

        /* Door Lock Keypad */
        .door-pin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 250px;
            margin: 0 auto;
        }

        .door-pin-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #334155;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 auto;
            user-select: none;
        }

        body.light-mode .door-pin-btn {
            border-color: #cbd5e1;
            color: #0f172a;
        }

        .door-pin-btn:hover,
        .door-pin-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        body.light-mode .door-pin-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .door-pin-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #334155;
            transition: 0.2s;
        }

        body.light-mode .door-pin-dot {
            background: #cbd5e1;
        }

        .session-login-badge {
            font-size: 12px;
            color: #86efac;
            text-align: center;
            margin: -14px 0 14px 0;
            padding: 6px 10px;
            line-height: 1.35;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        body.light-mode .session-login-badge {
            color: #15803d;
            background: #f1f5f9;
        }

        /* Plant Health — compact assistant-style controls */
        .plant-health-wrap {
            max-width: 640px;
            margin: 0 auto;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
        }
        .plant-health-wrap > h1 {
            font-size: clamp(1.35rem, 4vw, 1.75rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .plant-health-sub {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.55;
            margin-bottom: 1.25rem;
            text-align: center;
        }
        .plant-health-sub code {
            background: #252538;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 0.85em;
        }
        body.light-mode .plant-health-sub code {
            background: #e2e8f0;
            color: #0f172a;
        }
        .plant-ui-controls {
            background: #1e1e2f;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: clamp(1rem, 3vw, 1.35rem);
            margin-bottom: 1rem;
            text-align: center;
        }
        body.light-mode .plant-ui-controls {
            background: #ffffff;
            border-color: #e2e8f0;
        }
        .plant-model-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.65rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        .plant-model-row label {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        body.light-mode .plant-model-row label {
            color: #64748b;
        }
        .plant-or {
            color: #94a3b8;
            font-size: 0.85rem;
            margin: 0.35rem 0 0.75rem;
        }
        .plant-input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: stretch;
            justify-content: center;
        }
        .plant-btn-mic {
            width: 100%;
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.75rem;
            transition: background 0.15s;
        }
        .plant-btn-mic:hover {
            background: #16a34a;
        }
        .plant-btn-send {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .plant-btn-send:hover {
            background: #1d4ed8;
        }
        .plant-photo-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            justify-content: stretch;
            margin-bottom: 0.75rem;
        }
        .plant-photo-actions label.plant-upload-zone {
            flex: 1 1 200px;
            padding: 14px 16px;
            border: 1px solid #334155;
            border-radius: 10px;
            cursor: pointer;
            background: #252538;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: border-color 0.15s, background 0.15s;
        }
        .plant-photo-actions label.plant-upload-zone:hover {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.12);
        }
        body.light-mode .plant-photo-actions label.plant-upload-zone {
            background: #f8fafc;
            color: #0f172a;
            border-color: #cbd5e1;
        }
        .plant-btn-camera {
            flex: 1 1 200px;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .plant-btn-camera:hover {
            background: #16a34a;
        }
        .plant-section-hint {
            color: #64748b;
            font-size: 0.8rem;
            margin: 0 0 0.75rem;
            text-align: center;
        }
        .plant-chat-box {
            background: #1e1e2f;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 1.15rem;
            margin-top: 1rem;
            text-align: left;
            display: none;
        }
        body.light-mode .plant-chat-box {
            background: #f8fafc;
            border-color: #e2e8f0;
        }
        .plant-chat-box h4 {
            margin: 0 0 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #94a3b8;
        }
        /* Voice dashboard — model / text / reply */
        #voiceOllamaModelSelect {
            flex: 1 1 180px;
            min-width: 140px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #252538;
            color: #f1f5f9;

        // --- Theme Logic ---
        if (localStorage.getItem("theme") === "light") {

            else if (name === "Door Unlock") {

                            <div class="door-vault-face">

                                <p>AI camera identity verification</p>

                                <button onclick="startDoor()" class="feature-btn-primary feature-btn-teal">

                                </button>
                                <p id="doorStatus" class="feature-status" style="color:#cffafe;"></p>
                            </div>
                        </div>
                    </div>
                `;

                // Initialize Keypad Logic
                window.doorPinEntry = "";
                window.updateDoorPinDots = function () {
                    const dots = document.querySelectorAll("#doorPinDots .door-pin-dot");
                    dots.forEach((dot, idx) => {
                        const isLightMode = document.body.classList.contains('light-mode');
                        if (idx < window.doorPinEntry.length) {
                            dot.style.background = "var(--accent-color)";
                            dot.style.transform = "scale(1.2)";
                        } else {
                            dot.style.background = isLightMode ? "#cbd5e1" : "#334155";
                            dot.style.transform = "scale(1)";
                        }
                    });
                };

                window.doorPressPin = function (digit) {
                    if (window.doorPinEntry.length >= 4) return;
                    window.doorPinEntry += digit;
                    window.updateDoorPinDots();

                    if (window.doorPinEntry.length === 4) {
                        setTimeout(window.verifyDoorPin, 200);
                    }
                };

                window.doorBackspacePin = function () {
                    if (window.doorPinEntry.length > 0) {
                        window.doorPinEntry = window.doorPinEntry.slice(0, -1);
                        window.updateDoorPinDots();
                    }
                };

                window.doorClearPin = function () {
                    window.doorPinEntry = "";
                    window.updateDoorPinDots();
                    document.getElementById("doorPinStatus").innerText = "";
                };

                window.verifyDoorPin = function () {
                    const activeId = localStorage.getItem('smarthome_active_profile');
                    const profiles = JSON.parse(localStorage.getItem('smarthome_profiles')) || [];
                    const activeProf = profiles.find(p => p.id === activeId);
                    const statusEl = document.getElementById("doorPinStatus");

                    if (!activeProf || !activeProf.pin) {
                        statusEl.innerText = "No PIN set for your profile.";
                        statusEl.style.color = "#ef4444";
                        setTimeout(window.doorClearPin, 2000);
                        return;
                    }

                    if (window.doorPinEntry === activeProf.pin) {
                        statusEl.innerText = "🔓 Door Unlocked!";
                        statusEl.style.color = "#22c55e";
                        if (window.SmartHomeUI) {
                            SmartHomeUI.pushNotification("Door Unlock", "PIN verified — door opened", "success");
                            SmartHomeUI.showToast("Door unlocked!", "success");
                        }

                        // Send request to backend
                        var pinNotifyUrl = (window.location.origin && window.location.origin !== "null")
                            ? (window.location.origin + "/door/unlock-pin")
                            : "http://localhost:8080/door/unlock-pin";
                        fetch(pinNotifyUrl, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                profileName: activeProf.name || activeProf.username || "Profile"
                            })
                        })
                            .then(res => res.text())
                            .then(data => console.log(data))
                            .catch(e => console.log("Pin unlock request failed", e));

                        setTimeout(window.doorClearPin, 3000);
                    } else {
                        statusEl.innerText = "Incorrect PIN!";
                        statusEl.style.color = "#ef4444";

                        // Send failure request to backend
                        var pinFailedUrl = (window.location.origin && window.location.origin !== "null")
                            ? (window.location.origin + "/door/unlock-pin-failed")
                            : "http://localhost:8080/door/unlock-pin-failed";
                        fetch(pinFailedUrl, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                profileName: activeProf ? (activeProf.name || activeProf.username || "Profile") : "Unknown Profile"
                            })
                        }).catch(e => console.log("Pin failed notification error", e));

                        // Shake effect
                        const dotsContainer = document.getElementById("doorPinDots");
                        dotsContainer.style.transform = "translateX(-10px)";
                        setTimeout(() => dotsContainer.style.transform = "translateX(10px)", 100);
                        setTimeout(() => dotsContainer.style.transform = "translateX(-10px)", 200);
                        setTimeout(() => dotsContainer.style.transform = "translateX(0)", 300);

                        setTimeout(window.doorClearPin, 1000);
                    }
                };
            }
            else if (name === "Voice") {
                document.getElementById("contentArea").innerHTML = `
                    <div class="page-voice">
                        <div class="voice-app-layout">
                            <div class="voice-sidebar">
                                <div class="voice-sidebar-avatar">🤖</div>
                                <h2>Ollama AI</h2>
                                <div class="voice-sidebar-item">🎙️ Speech input</div>

                                <div class="voice-sidebar-item">🧠 phi3 / llama3</div>
                                <div class="voice-sidebar-item">🌿 Photos → Plant Health</div>
                            </div>
                            <div class="voice-main">
                                <div class="voice-bubble-header">
                                    <h1>Voice Assistant</h1>
                                    <p>Ask anything — local AI, no cloud</p>
                                </div>
                                <div class="plant-ui-controls">
                                    <button type="button" class="plant-btn-mic" id="voiceRecordBtn">🎙️ Tap to Speak</button>
                                    <div class="plant-model-row">
                                        <label for="voiceOllamaModelSelect">Model</label>
                                        <select id="voiceOllamaModelSelect" aria-label="Ollama chat model">
                                            <option value="phi3" selected>phi3</option>
                                            <option value="llama3">llama3</option>
                                        </select>
                                    </div>
                                    <p class="plant-or">— or type your question —</p>
                                    <div class="plant-input-row">
                                        <input type="text" id="voiceAskInput" placeholder="Ask anything…" autocomplete="off">
                                        <button type="button" class="plant-btn-send" id="voiceSendAskBtn">Send</button>
                                    </div>
                                </div>
                                <div class="plant-chat-box" id="voiceTextReply" style="display:none;">
                                    <h4>💬 Assistant reply</h4>
                                    <div id="voiceTextReplyBody"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                (function initVoiceAssistUi() {
                    const LS_MODEL_KEY = "smarthome_ollama_chat_model";
                    const voiceModelSel = document.getElementById("voiceOllamaModelSelect");
                    if (voiceModelSel) {
                        const savedM = localStorage.getItem(LS_MODEL_KEY);
                        if (savedM === "phi3" || savedM === "llama3") voiceModelSel.value = savedM;
                        voiceModelSel.addEventListener("change", function () {
                            localStorage.setItem(LS_MODEL_KEY, voiceModelSel.value);
                        });
                    }

                    function voiceAskUrl() {
                        return (window.location.origin && window.location.origin !== "null")
                            ? (window.location.origin + "/ai/ask")
                            : "http://localhost:8080/ai/ask";
                    }

                    window.sendVoiceAsk = function () {
                        const input = document.getElementById("voiceAskInput");
                        const q = input && input.value ? input.value.trim() : "";
                        if (!q) return;
                        const model = voiceModelSel ? voiceModelSel.value : "phi3";
                        const replyBox = document.getElementById("voiceTextReply");
                        const replyBody = document.getElementById("voiceTextReplyBody");
                        replyBox.style.display = "block";
                        replyBody.innerHTML = "<span style=\"color:#94a3b8;font-style:italic;\">Thinking…</span>";

                        fetch(voiceAskUrl(), {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ model: model, question: q })
                        })
                            .then(function (res) {
                                if (!res.ok) {
                                    return res.text().then(function (t) {
                                        throw new Error(t || res.statusText);
                                    });
                                }
                                return res.text();
                            })
                            .then(function (text) {
                                replyBody.innerText = text;
                                if (typeof window.smartHomeSpeakResponse === "function") {
                                    window.smartHomeSpeakResponse(text);
                                }
                            })
                            .catch(function (err) {
                                replyBody.innerText = "Request failed: " + err.message;
                            });
                    };

                    const sendBtn = document.getElementById("voiceSendAskBtn");
                    const askInput = document.getElementById("voiceAskInput");
                    if (sendBtn) sendBtn.addEventListener("click", function () { window.sendVoiceAsk(); });
                    if (askInput) {
                        askInput.addEventListener("keydown", function (e) {
                            if (e.key === "Enter") {
                                e.preventDefault();
                                window.sendVoiceAsk();
                            }
                        });
                    }

                    const voiceRecBtn = document.getElementById("voiceRecordBtn");
                    if (voiceRecBtn && ("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
                        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                        const voiceRec = new Recognition();
                        voiceRec.lang = "en-IN";
                        voiceRec.continuous = false;
                        voiceRec.interimResults = true;
                        let voiceListening = false;

                        voiceRec.onstart = function () {
                            voiceListening = true;
                            voiceRecBtn.innerText = "Listening…";
                            voiceRecBtn.style.background = "#ea580c";
                        };
                        voiceRec.onend = function () {
                            voiceListening = false;
                            voiceRecBtn.innerText = "Tap to Speak";
                            voiceRecBtn.style.background = "";
                        };
                        voiceRec.onerror = function () {
                            voiceListening = false;
                            voiceRecBtn.innerText = "Error — tap to retry";
                            voiceRecBtn.style.background = "#dc2626";
                        };
                        voiceRec.onresult = function (event) {
                            let transcript = "";
                            let isFinal = false;
                            for (let i = event.resultIndex; i < event.results.length; ++i) {
                                transcript += event.results[i][0].transcript;
                                if (event.results[i].isFinal) isFinal = true;
                            }
                            if (askInput) askInput.value = transcript.trim();
                            if (isFinal && transcript.trim()) window.sendVoiceAsk();
                        };

                        voiceRecBtn.addEventListener("click", function () {
                            if (voiceListening) return;
                            try {
                                voiceRec.start();
                            } catch (ex) {
                                console.error(ex);
                            }
                        });
                    } else if (voiceRecBtn) {
                        voiceRecBtn.disabled = true;
                        voiceRecBtn.title = "Speech recognition not supported in this browser.";
                    }
                })();
            }
            else if (name === "Plant Health") {
                document.getElementById("contentArea").innerHTML = `
                    <div class="page-plant plant-health-wrap">
                        <div class="plant-garden-header">
                            <h1>🌿 Smart Plant Doctor</h1>
                            <p>Upload or snap a photo — llava AI diagnoses leaf health & diseases</p>
                        </div>
                        <p class="plant-health-sub" style="text-align:center; margin-bottom:18px;">Voice chat → open <strong>Voice</strong>. Run <code>ollama pull llava</code> first.</p>
                        <div class="plant-action-grid">
                            <div class="plant-action-card">
                                <h3>📤 Upload Photo</h3>
                                <label class="plant-upload-zone">
                                    Choose image file
                                    <input type="file" id="plantImageInput" accept="image/*" style="display:none;" onchange="handlePlantUpload(event)">
                                </label>
                            </div>
                            <div class="plant-action-card">
                                <h3>📷 Live Camera</h3>
                                <button type="button" class="plant-btn-camera" onclick="startPlantCamera()" style="width:100%; padding:14px; border:none; border-radius:10px; color:#fff; cursor:pointer;">Open Camera</button>
                            </div>
                        </div>
                        <div class="plant-ui-controls">
                            <div id="plantCameraContainer" style="display:none; text-align:center;">
                                <video id="plantVideo" autoplay playsinline style="width:100%; max-width:400px; border-radius:10px; border:1px solid #334155; margin-bottom:10px;"></video>
                                <div>
                                    <button type="button" class="plant-btn-snap" onclick="capturePlantPhoto()">📸 Snap Photo</button>
                                    <button type="button" class="plant-btn-cancel" onclick="stopPlantCamera()">Cancel</button>
                                </div>
                            </div>
                            <div id="plantPreviewContainer" style="display:none; text-align:center;">
                                <img id="plantPreviewImg" style="max-width:300px; max-height:300px;">
                                <div>
                                    <button type="button" class="plant-btn-analyze" onclick="analyzePlantImage()" id="analyzePlantBtn">🔍 Analyze Plant</button>
                                </div>
                            </div>
                        </div>
                        <div id="plantResultContainer" class="plant-result-box" style="display:none;">
                            <h3>🌱 Ollama Analysis</h3>
                            <div id="plantResultText" style="white-space: pre-wrap; line-height: 1.6; color:#cbd5e1;"></div>
                        </div>
                    </div>
                `;
                
                // --- Javascript logic attached to window for scope ---
                window.plantSelectedFile = null;
                window.plantStream = null;
                
                window.handlePlantUpload = function(event) {
                    if (event.target.files && event.target.files[0]) {
                        window.plantSelectedFile = event.target.files[0];
                        showPlantPreview(URL.createObjectURL(window.plantSelectedFile));
                        stopPlantCamera();
                    }
                };

                window.startPlantCamera = function() {
                    const video = document.getElementById('plantVideo');
                    const cameraContainer = document.getElementById('plantCameraContainer');
                    const previewContainer = document.getElementById('plantPreviewContainer');
                    const resultContainer = document.getElementById('plantResultContainer');
                    
                    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                            .then(function(stream) {
                                window.plantStream = stream;
                                video.srcObject = stream;
                                cameraContainer.style.display = "block";
                                previewContainer.style.display = "none";
                                resultContainer.style.display = "none";
                            })
                            .catch(function(err) {
                                alert("Camera access denied or unavailable: " + err);
                            });
                    } else {
                        alert("Camera API not supported in this browser.");
                    }
                };
                
                window.capturePlantPhoto = function() {
                    const video = document.getElementById('plantVideo');
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob(function(blob) {
                        window.plantSelectedFile = new File([blob], "camera_capture.jpg", { type: "image/jpeg" });
                        showPlantPreview(URL.createObjectURL(window.plantSelectedFile));
                        stopPlantCamera();
                    }, "image/jpeg", 0.9);
                };
                
                window.stopPlantCamera = function() {
                    if (window.plantStream) {
                        window.plantStream.getTracks().forEach(track => track.stop());
                        window.plantStream = null;
                    }
                    if(document.getElementById('plantCameraContainer')) {
                        document.getElementById('plantCameraContainer').style.display = "none";
                    }
                };

                window.showPlantPreview = function(url) {
                    const previewImg = document.getElementById('plantPreviewImg');
                    const previewContainer = document.getElementById('plantPreviewContainer');
                    const resultContainer = document.getElementById('plantResultContainer');
                    
                    previewImg.src = url;
                    previewContainer.style.display = "block";
                    resultContainer.style.display = "none";
                };

                window.analyzePlantImage = function() {
                    if (!window.plantSelectedFile) return;
                    
                    const btn = document.getElementById('analyzePlantBtn');
                    const resultContainer = document.getElementById('plantResultContainer');
                    const resultText = document.getElementById('plantResultText');
                    
                    btn.innerText = "⏳ Analyzing...";
                    btn.disabled = true;
                    btn.style.opacity = "0.7";
                    
                    resultContainer.style.display = "block";
                    resultText.innerHTML = "<span id=\"plant-wait-hint\" style=\"color:#94a3b8;\">Sending image to Ollama (llava). First run can take several minutes on CPU…</span>";
                    const waitStart = Date.now();
                    const waitTimer = setInterval(function () {
                        const hint = document.getElementById("plant-wait-hint");
                        if (hint) {
                            hint.textContent = "Analyzing with Ollama vision… " + Math.floor((Date.now() - waitStart) / 1000) + "s elapsed";
                        }
                    }, 1000);

                    const formData = new FormData();
                    formData.append("image", window.plantSelectedFile);

                    const fetchOpts = { method: "POST", body: formData };
                    if (typeof AbortSignal !== "undefined" && typeof AbortSignal.timeout === "function") {
                        fetchOpts.signal = AbortSignal.timeout(900000);
                    }

                    fetch("/plant/analyze", fetchOpts)
                    .then(function (res) {
                        return res.text().then(function (text) {
                            if (!res.ok) {
                                throw new Error("HTTP " + res.status + ": " + (text || res.statusText).slice(0, 500));
                            }
                            return text;
                        });
                    })
                    .then(function (data) {
                        let formattedText = data.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                        resultText.innerHTML = formattedText;
                        if (typeof window.smartHomeSpeakResponse === 'function') {
                            window.smartHomeSpeakResponse(data);
                        }
                    })
                    .catch(function (err) {
                        var name = err && err.name ? err.name : "";
                        var tip = "";
                        if (name === "TimeoutError" || name === "AbortError") {
                            tip = " Request hit the 15-minute browser limit. Try a smaller photo or run <code>ollama run llava</code> once to load the model, then analyze again.";
                        }
                        var raw = (err && err.message) ? err.message : String(err);
                        var safe = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        resultText.innerHTML = "<span style=\"color:#f87171;\">Plant analysis failed: " + safe + "</span>"
                            + (tip ? "<p style=\"color:#94a3b8;font-size:13px;margin-top:8px;\">" + tip + "</p>" : "")
                            + "<p style=\"color:#94a3b8;font-size:13px;margin-top:8px;\">Check: Ollama is running, <code>ollama pull llava</code> completed, and this app can reach <code>http://localhost:11434</code> (see <code>ollama.base.url</code> in application properties).</p>";
                        console.error(err);
                    })
                    .finally(function () {
                        clearInterval(waitTimer);
                        btn.innerText = "🔍 Analyze Plant";
                        btn.disabled = false;
                        btn.style.opacity = "1";
                    });
                };
            }
        } // Close loadSection function

        /* =========================
           SENSOR DASHBOARD
        ========================= */
        function sensorLevel(value, warnAt, alertAt) {
            if (value >= alertAt) return "alert";
            if (value >= warnAt) return "warn";
            return "safe";
        }

        function renderSensorCard(opts) {
            const status = opts.status || "info";
            return `
                <div class="sensor-card status-${status}">
                    <div class="sensor-card-top">
                        <div>
                            <p class="sensor-type">${opts.type || "Sensor"}</p>
                            <h3 class="sensor-name">${opts.name}</h3>
                        </div>
                        <span class="sensor-icon">${opts.icon}</span>
                    </div>
                    ${opts.valueHtml}
                </div>
            `;
        }

        function renderSensorSection(title, cardsHtml) {
            return `
                <section>
                    <h2 class="sensor-section-title">${title}</h2>
                    <div class="sensor-grid">${cardsHtml}</div>
                </section>
            `;
        }

        async function loadSensorData() {
            const dashboard = document.getElementById("sensorDashboard");
            if (!dashboard) return;
            if (!dashboard.innerHTML.trim() && window.SmartHomeUI) {
                dashboard.innerHTML = SmartHomeUI.skeletonHtml("sensor");
            }

            try {
                const response = await fetch("/sensor/latest");
                if (!response.ok) throw new Error(`Server responded with status: ${response.status}`);

                const text = await response.text();
                if (!text) throw new Error("Empty response from backend");

                const data = JSON.parse(text);
                const temp = data.temperature ?? 0;
                const hum = data.humidity ?? 0;
                const motion = !!data.motionDetected;
                const flame = !!data.flameDetected;
                const mq2 = data.mq2Smoke ?? 0;
                const mq6 = data.mq6Lpg ?? 0;
                const mq7 = data.mq7Gas ?? 0;
                const ultrasonic = data.ultraSonic ?? 0;
                const ldr = data.ldrValue ?? 0;
                const soil = data.soilMoisture ?? 0;
                const water = data.waterLevel ?? 0;

                const anyAlert = motion || flame || mq2 > 300 || mq6 > 300 || mq7 > 300;
                const updated = data.recordedAt
                    ? new Date(data.recordedAt).toLocaleString()
                    : new Date().toLocaleString();

                const summaryHtml = `
                    <div class="sensor-summary">
                        <div class="sensor-summary-card highlight-temp">
                            <p class="sensor-type">Temperature</p>
                            <div class="sensor-value-row">
                                <span class="sensor-value">${temp}</span>
                                <span class="sensor-unit">°C</span>
                            </div>
                        </div>
                        <div class="sensor-summary-card highlight-hum">
                            <p class="sensor-type">Humidity</p>
                            <div class="sensor-value-row">
                                <span class="sensor-value">${hum}</span>
                                <span class="sensor-unit">%</span>
                            </div>
                        </div>
                        <div class="sensor-summary-card ${motion ? "highlight-alert" : "highlight-safe"}">
                            <p class="sensor-type">Motion</p>
                            <p class="sensor-status-text ${motion ? "alert" : "safe"}">${motion ? "Detected" : "Clear"}</p>
                        </div>
                        <div class="sensor-summary-card ${anyAlert ? "highlight-alert" : "highlight-safe"}">
                            <p class="sensor-type">Overall Status</p>
                            <p class="sensor-status-text ${anyAlert ? "alert" : "safe"}">${anyAlert ? "Check alerts" : "All normal"}</p>
                        </div>
                    </div>
                    <p class="sensor-updated">Last updated: ${updated}</p>
                `;

                const climateHtml = renderSensorSection("Climate & Environment", [
                    renderSensorCard({
                        icon: "🌡️", name: "Temperature", type: "DHT11", status: temp > 35 ? "warn" : "info",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${temp}</span><span class="sensor-unit">°C</span></div>`
                    }),
                    renderSensorCard({
                        icon: "💧", name: "Humidity", type: "DHT11", status: hum > 80 ? "warn" : "info",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${hum}</span><span class="sensor-unit">%</span></div>`
                    }),
                    renderSensorCard({
                        icon: "🌱", name: "Soil Moisture", type: "Agriculture", status: soil < 25 ? "warn" : "safe",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${soil}</span><span class="sensor-unit">%</span></div>`
                    }),
                    renderSensorCard({
                        icon: "🚰", name: "Water Level", type: "Tank", status: water < 20 ? "warn" : "safe",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${water}</span><span class="sensor-unit">%</span></div>`
                    })
                ].join(""));

                const safetyHtml = renderSensorSection("Safety & Security", [
                    renderSensorCard({
                        icon: "👁️", name: "PIR Motion", type: "Security", status: motion ? "alert" : "safe",
                        valueHtml: `<p class="sensor-status-text ${motion ? "alert" : "safe"}">${motion ? "⚠ Motion Detected" : "No Motion"}</p>`
                    }),
                    renderSensorCard({
                        icon: "🔥", name: "Flame Sensor", type: "Fire", status: flame ? "alert" : "safe",
                        valueHtml: `<p class="sensor-status-text ${flame ? "alert" : "safe"}">${flame ? "Flame Detected" : "Safe"}</p>`
                    }),
                    renderSensorCard({
                        icon: "📡", name: "Ultrasonic", type: "Distance", status: "info",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${ultrasonic}</span><span class="sensor-unit">cm</span></div>`
                    })
                ].join(""));

                const airHtml = renderSensorSection("Air Quality & Light", [
                    renderSensorCard({
                        icon: "💨", name: "MQ2 Smoke", type: "Air", status: sensorLevel(mq2, 200, 300),
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${mq2}</span><span class="sensor-unit">ppm</span></div>`
                    }),
                    renderSensorCard({
                        icon: "⛽", name: "MQ6 LPG", type: "Gas", status: sensorLevel(mq6, 200, 300),
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${mq6}</span><span class="sensor-unit">ppm</span></div>`
                    }),
                    renderSensorCard({
                        icon: "🧪", name: "MQ7 Gas", type: "CO", status: sensorLevel(mq7, 200, 300),
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${mq7}</span><span class="sensor-unit">ppm</span></div>`
                    }),
                    renderSensorCard({
                        icon: "☀️", name: "LDR Light", type: "Ambient", status: ldr < 150 ? "warn" : "info",
                        valueHtml: `<div class="sensor-value-row"><span class="sensor-value">${ldr}</span><span class="sensor-unit">lux</span></div>`
                    })
                ].join(""));

                dashboard.innerHTML = summaryHtml + climateHtml + safetyHtml + airHtml;
            } catch (error) {
                console.error("Sensor API Error:", error);
                if (dashboard) {
                    dashboard.innerHTML = `
                        <div class="sensor-error-box">
                            <h3 style="margin:0 0 8px 0;">Sensor data not available</h3>
                            <p style="margin:0;color:#94a3b8;">Check ESP32 connection or restart the server.</p>
                        </div>
                    `;
                }
            }
        }

        /* =========================
           NAVIGATION & UTIL
        ========================= */
        function openRoom(id) {
            window.location.href = "room.html?id=" + id;
        }

        function logout() {
            fetch("/logout")
                .then(() => window.location.href = "login.html")
                .catch(err => console.error("Logout error:", err));
        }

        function startDoor() {
            var statusEl = document.getElementById("doorStatus");
            if (statusEl) {
                statusEl.innerText = "Starting face verification…";
                statusEl.style.color = "#94a3b8";
            }
            var unlockUrl = (window.location.origin && window.location.origin !== "null")
                ? (window.location.origin + "/door/unlock")
                : "http://localhost:8080/door/unlock";
            fetch(unlockUrl)
                .then(function (res) { return res.text(); })
                .then(function (data) {
                    if (statusEl) {
                        statusEl.innerText = data;
                        statusEl.style.color = data.indexOf("Error") === 0 ? "#ef4444" : "#22c55e";
                    }
                    if (data.indexOf("Error") !== 0 && window.SmartHomeUI) {
                        SmartHomeUI.pushNotification("Door Unlock", "Face verification started", "success");
                    }
                })
                .catch(function (err) {
                    console.error(err);
                    if (statusEl) {
                        statusEl.innerText = "Could not reach server.";
                        statusEl.style.color = "#ef4444";
                    }
                });
        }

        function roomMeta(name) {
            const n = (name || "").toLowerCase();
            if (n.includes("living")) return { icon: "🛋️", theme: "living", desc: "TV, AC, lights & curtains" };
            if (n.includes("bed")) return { icon: "🛏️", theme: "bedroom", desc: "Lights, fan, AC & night lamp" };
            if (n.includes("kitchen")) return { icon: "🍳", theme: "kitchen", desc: "Lights, exhaust & appliances" };
            if (n.includes("bath")) return { icon: "🚿", theme: "bathroom", desc: "Lights, geyser & exhaust" };
            if (n.includes("hall")) return { icon: "🚪", theme: "hall", desc: "Hall lights, fan & door lock" };
            return { icon: "🏠", theme: "hall", desc: "Smart room devices" };
        }

        function renderRoomCard(room, stats) {
            const meta = roomMeta(room.name);
            const on = stats ? stats.on : 0;
            const total = stats ? stats.total : 0;
            return `
                <div class="room-card-pro theme-${meta.theme}" onclick="openRoom(${room.id})">
                    <div class="room-card-top">
                        <div>
                            <h2 class="room-card-name">${room.name}</h2>
                            <p class="room-card-desc">${meta.desc}</p>
                        </div>
                        <span class="room-card-icon">${meta.icon}</span>
                    </div>
                    <div class="room-card-badges">
                        <span class="room-badge">${total} device${total !== 1 ? "s" : ""}</span>
                        <span class="room-badge ${on > 0 ? "on" : ""}">${on} ON</span>
                        <span class="room-badge ${room.lightOn ? "light-on" : ""}">${room.lightOn ? "Light ON" : "Light OFF"}</span>
                    </div>
                    <p class="room-open-hint">Tap to open room controls →</p>
                </div>
            `;
        }

        function renderRoomsPage(rooms, deviceStats) {
            let totalDevices = 0;
            let devicesOn = 0;
            let activeRooms = 0;

            rooms.forEach(function (room) {
                const s = deviceStats[room.id] || { total: 0, on: 0 };
                totalDevices += s.total;
                devicesOn += s.on;
                if (s.on > 0 || room.lightOn) activeRooms++;
            });

            const cardsHtml = rooms.map(function (room) {
                return renderRoomCard(room, deviceStats[room.id]);
            }).join("");

            return `
                <div class="page-rooms">
                <div class="hero-rooms">
                    <h1>🏠 Your Home Rooms</h1>
                    <p>Tap any room to control lights, fans, AC, TV & smart devices</p>
                </div>
                <div class="room-summary">
                    <div class="room-summary-card accent-blue">
                        <p class="room-summary-label">Total Rooms</p>
                        <p class="room-summary-value">${rooms.length}</p>
                    </div>
                    <div class="room-summary-card accent-purple">
                        <p class="room-summary-label">Total Devices</p>
                        <p class="room-summary-value">${totalDevices}</p>
                    </div>
                    <div class="room-summary-card accent-green">
                        <p class="room-summary-label">Devices ON</p>
                        <p class="room-summary-value">${devicesOn}</p>
                    </div>
                    <div class="room-summary-card ${activeRooms > 0 ? "accent-green" : ""}">
                        <p class="room-summary-label">Active Rooms</p>
                        <p class="room-summary-value">${activeRooms}</p>
                    </div>
                </div>
                <h2 class="room-section-title">Your Home</h2>
                <div class="rooms-grid">${cardsHtml}</div>
                </div>
            `;
        }

        async function loadRooms() {
            const content = document.getElementById("contentArea");
            content.innerHTML = `
                <div class="page-rooms">
                <div class="hero-rooms">
                    <h1>🏠 Your Home Rooms</h1>
                    <p>Loading rooms…</p>
                </div>
                ${window.SmartHomeUI ? SmartHomeUI.skeletonHtml("rooms") : ""}
                </div>
            `;

            try {
                const [roomsRes] = await Promise.all([
                    fetch("/rooms")
                ]);
                if (!roomsRes.ok) throw new Error("HTTP " + roomsRes.status);
                const data = await roomsRes.json();

                const deviceStats = {};
                await Promise.all(data.map(async function (room) {
                    try {
                        const dr = await fetch("/devices/room/" + room.id);
                        const devices = dr.ok ? await dr.json() : [];
                        deviceStats[room.id] = {
                            total: devices.length,
                            on: devices.filter(function (d) { return d.status === true; }).length
                        };
                    } catch (e) {
                        deviceStats[room.id] = { total: 0, on: 0 };
                    }
                }));

                if (!data.length) {
                    content.innerHTML = `
                        <div class="room-page-header"><div><h1>Rooms</h1><p class="room-page-sub">No rooms found.</p></div></div>
                    `;
                    return;
                }

                content.innerHTML = renderRoomsPage(data, deviceStats);
            } catch (err) {
                console.error("Fetch failed for loadRooms:", err);
                const fallbackRooms = [
                    { id: 1, name: "Living Room", lightOn: false },
                    { id: 2, name: "Bedroom 1", lightOn: false },
                    { id: 3, name: "Bedroom 2", lightOn: false },
                    { id: 4, name: "Kitchen", lightOn: false },
                    { id: 5, name: "Bathroom", lightOn: false },
                    { id: 6, name: "Hall", lightOn: false }
                ];
                content.innerHTML = renderRoomsPage(fallbackRooms, {});
            }
        }

        // Initialize display
        // Profile Routing Logic
        window.updateGlobalProfileBadge = function () {
            const activeId = localStorage.getItem('smarthome_active_profile');
            const profiles = JSON.parse(localStorage.getItem('smarthome_profiles')) || [];
            const activeProf = profiles.find(p => p.id === activeId);

            const avatarEl = document.getElementById("global-avatar");
            const nameEl = document.getElementById("global-name");

            if (activeProf) {
                avatarEl.innerText = activeProf.avatar;
                nameEl.innerText = activeProf.name;
            } else {
                avatarEl.innerText = "👤";
                nameEl.innerText = "Select Profile";
            }
        };

        // Boot check
        window.updateGlobalProfileBadge();
        if (!localStorage.getItem('smarthome_active_profile')) {
            navigate('Profile');
        } else {
            navigate('Rooms');
        }

    </script>
</body>

</html>
